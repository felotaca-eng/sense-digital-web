<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Sense Digital</title>
  <meta name="description" content="Ideas, guias y tendencias sobre marketing, tecnologia, IA y crecimiento digital para empresas." />
  <link rel="icon" type="image/png" href="../logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d1347;color:#fff}
    a{text-decoration:none;color:inherit}
    .container{max-width:1160px;margin:0 auto;padding:0 24px}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(13,19,71,.95);border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px)}
    .topbar__inner{height:78px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .topbar img{height:48px;mix-blend-mode:screen}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:999px;font-weight:700}
    .btn--ghost{border:1px solid rgba(255,255,255,.26)}
    .hero{padding:72px 0 28px}
    .kicker{font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;color:#7de88a;font-weight:800}
    h1{font-size:clamp(2.2rem,5vw,4.1rem);line-height:1.05;margin-top:12px;max-width:12ch}
    .sub{margin-top:14px;color:#a8b3d8;max-width:62ch;line-height:1.75}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;padding:26px 0 72px}
    .card{display:flex;flex-direction:column;background:#131b57;border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;min-height:100%}
    .card img{width:100%;height:190px;object-fit:cover;background:#0c1242}
    .card__body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:10px;flex:1}
    .meta{font-size:.78rem;text-transform:uppercase;letter-spacing:.12em;color:#7de88a;font-weight:700}
    .card h2{font-size:1.2rem;line-height:1.3}
    .card p{color:#a8b3d8;line-height:1.65;font-size:.94rem}
    .card__cta{margin-top:auto;color:#7de88a;font-weight:700}
    .empty{padding:22px;border:1px dashed rgba(255,255,255,.28);border-radius:14px;color:#a8b3d8}
    @media (max-width:980px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:640px){.grid{grid-template-columns:1fr}.hero{padding-top:46px}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="topbar__inner">
        <a href="../index.html"><img src="../logo.png" alt="Sense Digital" /></a>
        <a href="../index.html" class="btn btn--ghost">Volver al sitio</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="kicker">Blog Sense Digital</div>
      <h1>Contenido para crecer con criterio digital.</h1>
      <p class="sub">Publicamos guias practicas sobre marketing, IA, automatizacion, desarrollo y operacion comercial para empresas en crecimiento.</p>
    </section>

    <section id="posts" class="grid"></section>
  </main>

  <script>
    async function loadPosts() {
      const container = document.getElementById('posts');
      try {
        const res = await fetch('./posts-manifest.json', { cache: 'no-store' });
        const posts = await res.json();
        if (!Array.isArray(posts) || posts.length === 0) {
          container.innerHTML = '<div class="empty">Aun no hay publicaciones. Vuelve pronto.</div>';
          return;
        }
        container.innerHTML = posts.map(post => {
          const date = new Date(post.publishAt);
          const pretty = new Intl.DateTimeFormat('es-CO', { dateStyle: 'medium' }).format(date);
          return `
            <article class="card">
              <img src="${post.coverImage}" alt="${post.title}" loading="lazy" />
              <div class="card__body">
                <div class="meta">${post.category} · ${pretty}</div>
                <h2>${post.title}</h2>
                <p>${post.excerpt}</p>
                <a class="card__cta" href="${post.url}">Leer articulo →</a>
              </div>
            </article>
          `;
        }).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty">No se pudieron cargar los articulos.</div>';
      }
    }
    loadPosts();
  </script>
</body>
</html>
